{% extends 'base.html' %}
{% block title %}QR Scanner - GadgetMS{% endblock %}
{% block nav_admin %}active{% endblock %}

{% block content %}
<div class="page-header">
  <h1>QR Scanner</h1>
  <p>Scan a Gadget Request QR code to automatically issue or return gadgets.</p>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
  <div id="reader" style="width: 100%;"></div>
  <div id="scan-result" style="margin-top: 20px; font-weight: bold; text-align: center;"></div>
</div>

<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script>
  let isProcessing = false;

  function onScanSuccess(decodedText, decodedResult) {
    if (isProcessing) return;
    isProcessing = true;

    const resultDiv = document.getElementById('scan-result');
    resultDiv.innerHTML = '<span style="color: blue;">Processing QR code...</span>';

    fetch("{% url 'qr_management:process_scan' %}", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": "{{ csrf_token }}"
      },
      body: JSON.stringify({ qr_data: decodedText })
    })
    .then(response => response.json())
    .then(data => {
      if (data.success) {
        // Stop the camera on success
        html5QrcodeScanner.clear().then(() => {
          // Show pop message
          alert(data.message);
          
          // Display success result and a button to restart
          resultDiv.innerHTML = `
            <div style="background: rgba(76,175,130,0.1); border: 1px solid var(--success); color: var(--success); padding: 15px; border-radius: 8px; margin-bottom: 20px;">
              <strong>Success!</strong><br> ${data.message}
            </div>
            <button class="btn btn-primary" onclick="window.location.reload()" style="width: 100%; justify-content: center;">
              Scan Another QR Code
            </button>
          `;
        }).catch(err => console.log("Failed to clear scanner", err));

      } else {
        // Only cooldown on failure so they can try again
        resultDiv.innerHTML = `<span style="color: red;">${data.message}</span>`;
        setTimeout(() => { isProcessing = false; }, 3000); 
      }
    })
    .catch(error => {
      resultDiv.innerHTML = `<span style="color: red;">Error processing scan.</span>`;
      setTimeout(() => { isProcessing = false; }, 3000);
    });
  }

  function onScanFailure(error) {
    // Handle scan failure, usually better to ignore and keep scanning
  }

  let html5QrcodeScanner = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: {width: 250, height: 250} },
    /* verbose= */ false);
  html5QrcodeScanner.render(onScanSuccess, onScanFailure);
</script>
{% endblock %}
